<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark teal background -->
  <rect width="64" height="64" rx="14" fill="#1D4442"/>

  <!-- Connecting lines -->
  <line x1="19" y1="10" x2="43" y2="19" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="19" y1="10" x2="9"  y2="31" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="43" y1="19" x2="51" y2="38" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="9"  y1="31" x2="30" y2="35" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="30" y1="35" x2="51" y2="38" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="9"  y1="31" x2="17" y2="53" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="17" y1="53" x2="30" y2="35" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="43" y1="19" x2="30" y2="35" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- White nodes -->
  <circle cx="19" cy="10" r="7"   fill="#FFFFFF"/>
  <circle cx="9"  cy="31" r="7"   fill="#FFFFFF"/>
  <circle cx="17" cy="53" r="6.5" fill="#FFFFFF"/>
  <circle cx="38" cy="54" r="5.5" fill="#FFFFFF"/>

  <!-- Gold nodes -->
  <circle cx="43" cy="19" r="5.5" fill="#EAB830"/>
  <circle cx="30" cy="35" r="5.5" fill="#EAB830"/>
  <circle cx="51" cy="38" r="6"   fill="#EAB830"/>
</svg>
